services:
  postgres:
    image: postgres:17-alpine
    container_name: marketplace-analytics-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: marketplace_analytics
      POSTGRES_USER: marketplace
      POSTGRES_PASSWORD: marketplace
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data:
